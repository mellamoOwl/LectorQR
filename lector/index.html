<!DOCTYPE html>
<html lang="es">
<head>
 <audio id="success-sound" src="success.mp3" preload="auto"></audio>
  <meta charset="UTF-8">
  <title>Validador QR - Orbit</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="lector.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
 <header>
    <img src="orbitlogo.png" alt="Logo" class="logo">
</header>

  <h2> Validador de Entradas QR</h2>

  <textarea id="codeInput" placeholder="Códigos válidos, uno por línea"></textarea>
 <div class="botones-container">
  <button onclick="loadCodes()" class="qr-btn"> Cargar códigos válidos</button>
  <button onclick="startScanner()" class="qr-btn"> Iniciar escáner</button>
  <button onclick="stopScanner()" class="qr-btn"> Detener escáner</button>
  <button onclick="clearUsedCodes()" class="qr-btn"> Borrar códigos usados</button>
  </div>
 <div id="result"></div>

  <div id="reader" style="width: 300px; margin: auto; margin-top: 1rem;"></div>
 
</body>
</html>
